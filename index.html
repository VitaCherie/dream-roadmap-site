<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dream" />
<meta name="theme-color" content="#FFFFFF" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600;1,9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<title>Dream: Restructure &amp; Roadmap</title>
<style>
  /*
    Brand tokens from Dream Brand Guidelines, July 2026:
    Primary: Vivid Orange #ff5b00, Burnt Coffee #422d23, Grey #f4f4f4, White.
    Secondary (used sparingly, precedence order): Electric Mint #0dc499, Sky Blue #1773e0,
    Pomegranate #c80045, Fuel Yellow #f9c770, Dark Teal #176161, Iceberg Blue #8bb9c6.
    Core fonts are Richmond Display / Source Sans Variable; Richmond Display isn't available
    as a web font here, so Fraunces (a display serif of similar character) stands in for it.
    Type is always left-aligned per the guidelines, never centered or justified.
  */
  :root {
    --bg: #FFFFFF;
    --surface-1: #FFFFFF;
    --surface-2: #F4F4F4;
    --border: rgba(66,45,35,.14);
    --border-strong: rgba(66,45,35,.30);
    --text-primary: #422D23;
    --text-secondary: rgba(66,45,35,.72);
    --text-muted: rgba(66,45,35,.52);
    --accent: #FF5B00;
    --accent-soft: #FFE3CC;
    --accent-dark: #E14E00;
    --wheel-dormant-fill: #EFEFEF;
    --wheel-dormant-stroke: rgba(66,45,35,.26);
    --font-serif: "Fraunces", Georgia, "Times New Roman", serif;
    --font-sans: "Source Sans 3", Calibri, system-ui, -apple-system, sans-serif;
    --shadow: 3px 3px 0 rgba(66,45,35,0.08);
    --ease: cubic-bezier(.22,1,.36,1);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased; line-height: 1.4;
    cursor: default;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 20px; }
  .eyebrow { font-size: 12px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 6px; text-align: left; }
  h1 { font-family: var(--font-serif); font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -0.2px; text-align: left; }
  h1 em { color: var(--accent-dark); font-style: italic; }
  .subtitle { color: var(--text-secondary); font-size: 14px; margin: 10px 0 0; line-height: 1.55; text-align: left; max-width: 46em; }

  /* Grain overlay for texture */
  #grain { position: fixed; inset: 0; pointer-events: none; z-index: 60; opacity: .035; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* Scroll progress */
  #scrollProgress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--accent); z-index: 70; transition: width .1s linear; }

  /* Custom cursor */
  #cursorDot { position: fixed; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--accent); pointer-events: none; z-index: 65; transform: translate(-50%,-50%); transition: width .25s var(--ease), height .25s var(--ease), background .25s var(--ease), opacity .3s; opacity: 0; }
  #cursorDot.active { opacity: 1; }
  #cursorDot.hover { width: 34px; height: 34px; background: rgba(255,91,0,.12); }
  @media (pointer: coarse) { #cursorDot { display: none; } }

  /* Header */
  header.site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.86); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: max(env(safe-area-inset-top), 14px) 0 14px; }
  header .wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo-mark { height: 30px; width: auto; display: block; }
  .site-nav { display: flex; gap: 6px; }
  .site-nav a { font-family: var(--font-sans); font-weight: 700; font-size: 12.5px; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: background .3s, color .3s, border-color .3s, transform .3s var(--ease); display: inline-block; }
  .site-nav a.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  main { display: block; }
  section.section { padding: 56px 0 64px; scroll-margin-top: 78px; }
  section.section.alt { background: var(--surface-2); }
  section.section + section.section { border-top: 1px solid var(--border); }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1 !important; transform: none !important; transition: none !important; } }

  .phase-label { font-size: 15px; font-weight: 700; margin: 28px 0 8px; }

  .final-banner { display: none; background: var(--text-primary); color: #fff; border-radius: 14px; padding: 18px 22px; margin: 1.1rem 0 1.25rem; box-shadow: var(--shadow); }
  .final-banner.show { display: block; }
  .final-banner .big { font-family: var(--font-serif); font-size: 21px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.2px; }
  .final-banner .small { font-size: 13.5px; margin: 0; opacity: 0.88; }

  .main-row { display: grid; grid-template-columns: minmax(380px, 620px) 1fr; gap: 32px; align-items: start; margin-top: 1.25rem; }
  @media (max-width: 900px) { .main-row { grid-template-columns: 1fr; } .list-col { max-height: none !important; overflow: visible !important; } }
  .list-col { max-height: 660px; overflow-y: auto; padding-right: 4px; }

  .wheel-row { display: flex; flex-direction: row; align-items: stretch; gap: 16px; }
  .wheel-shell { flex: 1; min-width: 0; transition: filter .5s; }
  .wheel-shell.complete { filter: drop-shadow(0 0 22px rgba(255,91,0,0.35)); }

  .thermo-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 34px; flex-shrink: 0; }
  .thermo-label { font-family: var(--font-serif); font-weight: 700; font-size: 15px; color: var(--accent-dark); }
  .thermo-track { flex: 1; width: 22px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; box-shadow: inset 0 1px 3px rgba(66,45,35,0.08); }
  .thermo-fill { width: 100%; background: var(--accent); border-radius: 11px; transition: height .5s; }
  .thermo-cap { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

  .deliverables-heading { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 12px; }
  .deliverables-heading span:first-child { font-size: 13px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 0.8px; }
  .deliverables-heading span:last-child { font-size: 12px; color: var(--text-muted); }
  .ms-item { background: var(--surface-1); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .ms-tag { display: inline-block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--accent-dark); background: var(--accent-soft); padding: 2px 8px; border-radius: 20px; margin: 0 0 6px; }
  .ms-title { font-size: 15px; font-weight: 700; margin: 0 0 3px; }
  .ms-detail { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.5; }

  .coming-next { margin-top: 0.5rem; border: 1px dashed var(--border-strong); border-radius: 12px; padding: 1rem 1.25rem; background: var(--surface-1); }
  .coming-next p { font-size: 14px; font-weight: 700; margin: 0 0 8px; }
  .coming-next ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
  footer { text-align: left; color: var(--text-muted); font-size: 11px; padding: 24px 20px max(env(safe-area-inset-bottom), 24px); }
  footer a { color: var(--text-muted); text-decoration: underline; cursor: pointer; }

  /* Restructure section */
  .restructure-row { display: grid; grid-template-columns: minmax(380px, 620px) 1fr; gap: 32px; align-items: start; margin-top: 1.1rem; }
  @media (max-width: 900px) { .restructure-row { grid-template-columns: 1fr; } }
  .stage { position: relative; width: 100%; aspect-ratio: 680 / 630; }
  .stage svg.stage-wheel { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1.1s ease; }
  .stage.restructured svg.stage-wheel { opacity: 1; }
  .chip-pos { position: absolute; transform: translate(-50%, -50%); transition: left 1.3s var(--ease), top 1.3s var(--ease); }
  .chip { position: relative; background: var(--surface-1); border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 9px 15px; font-family: var(--font-serif); font-weight: 700; font-size: 13.5px; color: var(--text-primary); box-shadow: var(--shadow); white-space: nowrap; display: inline-block; animation: chipFloat 4s ease-in-out infinite; transition: background .6s, border-color .6s, color .6s, border-radius .4s; }
  .stage.restructured .chip { animation: none; border-radius: 8px; }
  @keyframes chipFloat { 0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); } 50% { transform: translateY(-8px) rotate(var(--rot, 0deg)); } }
  .chip-tag { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 5px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--accent-dark); background: var(--accent-soft); padding: 2px 8px; border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity .4s ease; }
  .stage.restructured .chip-tag { opacity: 1; transition: opacity .5s ease 1.05s; }
  .new-chip-pos { position: absolute; transform: translate(-50%, -50%) scale(0); transition: transform .55s cubic-bezier(.34,1.56,.64,1); }
  .new-chip-pos.show { transform: translate(-50%, -50%) scale(1); }
  .new-chip-pos .chip { animation: none; }
  .new-badge { position: absolute; top: -9px; right: -11px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 800; letter-spacing: .3px; padding: 2px 6px; border-radius: 20px; box-shadow: var(--shadow); font-family: var(--font-sans); }
  .chip-glow { animation: glowPulse 1.3s ease-out 2; }
  @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgba(255,91,0,.5); } 100% { box-shadow: 0 0 0 20px rgba(255,91,0,0); } }
  .restructure-btn { margin-top: 20px; padding: 12px 22px; font-size: 14px; font-weight: 700; font-family: var(--font-sans); color: #fff; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; box-shadow: var(--shadow); transition: transform .3s var(--ease), background .3s; }
  .restructure-btn.is-reset { background: var(--text-primary); }
  .stage-caption { margin-top: 14px; font-size: 13.5px; color: var(--text-secondary); min-height: 20px; }
  .vision-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow); }
  .vision-card p.vc-heading { font-size: 13px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 0.8px; margin: 0 0 12px; }
  .vision-card ul { margin: 0; padding-left: 18px; font-size: 13.5px; color: var(--text-secondary); line-height: 1.85; }
  .vision-card ul li::marker { color: var(--accent); }
  @media (max-width: 480px) {
    .chip { font-size: 10.5px; padding: 5px 9px; border-radius: 7px; }
    .chip-tag { font-size: 8px; padding: 1px 6px; }
    .new-badge { font-size: 7.5px; padding: 1px 4px; top: -7px; right: -8px; }
  }

  /* Password gate */
  .gate-wrap { padding: max(env(safe-area-inset-top), 18px) 20px 40px; }
  .gate { max-width: 340px; margin: 12vh auto 0; text-align: left; }
  .gate .lock { font-size: 34px; }
  .gate h2 { font-family: var(--font-serif); font-size: 20px; margin: 12px 0 4px; }
  .gate p { color: var(--text-secondary); font-size: 13px; margin: 0 0 18px; line-height: 1.5; }
  .gate input[type="password"] { width: 100%; padding: 13px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-1); color: var(--text-primary); box-shadow: var(--shadow); font-family: var(--font-sans); }
  .gate input[type="password"]:focus { outline: none; border-color: var(--accent); }
  .gate input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); }
  .gate button { width: 100%; margin-top: 10px; padding: 13px; font-size: 15px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; font-family: var(--font-sans); transition: transform .3s var(--ease); }
  .gate button:active { transform: scale(0.98); }
  .gate .err { color: #a53a24; font-size: 13px; margin-top: 12px; min-height: 16px; }
  .gate label { display: flex; gap: 7px; align-items: center; margin-top: 14px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
</style>
</head>
<body>
<div id="grain"></div>
<div id="cursorDot"></div>
<div id="scrollProgress"></div>
<header class="site-header">
  <div class="wrap">
    <img src="dream-logo.png" alt="Dream" class="logo-mark" />
    <nav class="site-nav" id="siteNav" hidden></nav>
  </div>
</header>
<main id="app">
  <div class="gate-wrap"><p style="color:var(--text-muted)">Loading&hellip;</p></div>
</main>
<footer id="foot"></footer>

<script>
const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
const esc = s => (s || "").replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
const svgns = "http://www.w3.org/2000/svg";
const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

const WEDGES = [
  {key:'portfolio', d:'M254.4,322.2 L92.7,269.7 A260,260 0 0,1 340,90 L340,260 A90,90 0 0,0 254.4,322.2 Z', lx:237, ly:208},
  {key:'tools',     d:'M340,260 L340,90 A260,260 0 0,1 587.3,269.7 L425.6,322.2 A90,90 0 0,0 340,260 Z',   lx:443, ly:208},
  {key:'media',     d:'M425.6,322.2 L587.3,269.7 A260,260 0 0,1 492.9,560.3 L392.9,422.8 A90,90 0 0,0 425.6,322.2 Z', lx:506, ly:404},
  {key:'funding',   d:'M392.9,422.8 L492.9,560.3 A260,260 0 0,1 187.1,560.3 L287.1,422.8 A90,90 0 0,0 392.9,422.8 Z', lx:340, ly:525},
  {key:'spaces',    d:'M287.1,422.8 L187.1,560.3 A260,260 0 0,1 92.7,269.7 L254.4,322.2 A90,90 0 0,0 287.1,422.8 Z',  lx:174, ly:404}
];

// Ramps drawn from Dream's official secondary palette (Brand Guidelines, July 2026):
// Electric Mint, Sky Blue and Pomegranate, used sparingly per the guide's precedence order.
// Media, Portfolio and the hub itself stay in the core Vivid Orange.
const RAMPS = {
  accent:    {fill:'#FFE3CC', stroke:'#FF5B00', title:'#E14E00', sub:'#C2470B'},
  banking:   {fill:'#E3EEFC', stroke:'#1773E0', title:'#125FB8', sub:'#1773E0'},
  community: {fill:'#DCF5EF', stroke:'#0DC499', title:'#0B8F6F', sub:'#0DC499'},
  fund:      {fill:'#F7E1E9', stroke:'#C80045', title:'#A30039', sub:'#C80045'}
};

let DATA = null;

function buildWheel(container, data) {
  container.innerHTML = "";
  const nStops = data.phases.length;

  const phaseLabel = el("p", "phase-label", "Phase 1 (" + data.phases[0].range + ")");
  container.appendChild(phaseLabel);

  const tlSvg = document.createElementNS(svgns, "svg");
  tlSvg.setAttribute("width", "100%"); tlSvg.setAttribute("viewBox", "0 0 1120 90");
  tlSvg.style.cssText = "cursor:pointer;touch-action:none";
  const baseline = document.createElementNS(svgns, "line");
  baseline.setAttribute("x1","40"); baseline.setAttribute("y1","40"); baseline.setAttribute("x2","1080"); baseline.setAttribute("y2","40");
  baseline.setAttribute("stroke","var(--border)"); baseline.setAttribute("stroke-width","2");
  tlSvg.appendChild(baseline);
  const progress = document.createElementNS(svgns, "line");
  progress.setAttribute("id","tl-progress"); progress.setAttribute("x1","40"); progress.setAttribute("y1","40"); progress.setAttribute("x2","40"); progress.setAttribute("y2","40");
  progress.setAttribute("stroke", RAMPS.accent.stroke); progress.setAttribute("stroke-width","2");
  tlSvg.appendChild(progress);
  const step = 1040 / (nStops - 1);
  data.phases.forEach((p, idx) => {
    const x = 40 + idx * step;
    const c = document.createElementNS(svgns, "circle");
    c.setAttribute("id","stop-"+p.phase); c.setAttribute("cx", x); c.setAttribute("cy", 40); c.setAttribute("r", 7);
    const t = document.createElementNS(svgns, "text");
    t.setAttribute("x", x); t.setAttribute("y", 66); t.setAttribute("text-anchor","middle");
    t.setAttribute("style","font-size:12px;font-family:var(--font-sans);fill:var(--text-muted)"); t.textContent = p.range;
    tlSvg.appendChild(c); tlSvg.appendChild(t);
  });
  container.appendChild(tlSvg);

  const finalBanner = el("div", "final-banner");
  finalBanner.id = "finalBanner";
  finalBanner.appendChild(el("p", "big", "The Dream ecosystem is fully operational"));
  finalBanner.appendChild(el("p", "small", "Every phase delivered. All five businesses live, one connected ecosystem."));
  container.appendChild(finalBanner);

  const mainRow = el("div", "main-row");
  container.appendChild(mainRow);
  const wheelCol = el("div", "wheel-col");
  const wheelRow = el("div", "wheel-row");
  wheelCol.appendChild(wheelRow);
  const listCol = el("div", "list-col");
  mainRow.appendChild(wheelCol);
  mainRow.appendChild(listCol);

  const thermoWrap = el("div", "thermo-wrap");
  thermoWrap.appendChild(el("div", "thermo-label", "0%"));
  thermoWrap.lastChild.id = "ecoPct";
  const track = el("div", "thermo-track");
  const fill = el("div", "thermo-fill");
  fill.id = "thermoFill";
  track.appendChild(fill);
  thermoWrap.appendChild(track);
  thermoWrap.appendChild(el("div", "thermo-cap", "live"));
  wheelRow.appendChild(thermoWrap);

  const wheelShell = el("div", "wheel-shell");
  wheelShell.id = "wheelCol";
  wheelRow.appendChild(wheelShell);
  const wheelSvg = document.createElementNS(svgns, "svg");
  wheelSvg.setAttribute("width","100%"); wheelSvg.setAttribute("viewBox","0 0 680 630");

  const defs = document.createElementNS(svgns, "defs");
  const pattern = document.createElementNS(svgns, "pattern");
  pattern.setAttribute("id","hatch-accent"); pattern.setAttribute("width","7"); pattern.setAttribute("height","7");
  pattern.setAttribute("patternUnits","userSpaceOnUse"); pattern.setAttribute("patternTransform","rotate(45)");
  const hatchBg = document.createElementNS(svgns, "rect");
  hatchBg.setAttribute("width","7"); hatchBg.setAttribute("height","7"); hatchBg.setAttribute("fill","#E3EEFC");
  const hatchLine = document.createElementNS(svgns, "line");
  hatchLine.setAttribute("x1","0"); hatchLine.setAttribute("y1","0"); hatchLine.setAttribute("x2","0"); hatchLine.setAttribute("y2","7");
  hatchLine.setAttribute("stroke","#1773E0"); hatchLine.setAttribute("stroke-width","3");
  pattern.appendChild(hatchBg); pattern.appendChild(hatchLine);
  defs.appendChild(pattern);
  wheelSvg.appendChild(defs);

  WEDGES.forEach(w => {
    const base = document.createElementNS(svgns,"path");
    base.setAttribute("d", w.d); base.setAttribute("fill","var(--wheel-dormant-fill)"); base.setAttribute("stroke","var(--wheel-dormant-stroke)"); base.setAttribute("stroke-width","0.5");
    wheelSvg.appendChild(base);
  });
  WEDGES.forEach(w => {
    const ov = document.createElementNS(svgns,"path");
    ov.setAttribute("id","ov-"+w.key); ov.setAttribute("d", w.d); ov.setAttribute("fill","none"); ov.setAttribute("stroke","none"); ov.setAttribute("stroke-width","1");
    ov.style.cssText = "opacity:0;transition:opacity .4s";
    wheelSvg.appendChild(ov);
  });

  const hubBase = document.createElementNS(svgns,"circle");
  hubBase.setAttribute("cx","340"); hubBase.setAttribute("cy","350"); hubBase.setAttribute("r","90");
  hubBase.setAttribute("fill","var(--wheel-dormant-fill)"); hubBase.setAttribute("stroke","var(--wheel-dormant-stroke)"); hubBase.setAttribute("stroke-width","0.5");
  wheelSvg.appendChild(hubBase);
  const hubOv = document.createElementNS(svgns,"circle");
  hubOv.setAttribute("id","ov-hub"); hubOv.setAttribute("cx","340"); hubOv.setAttribute("cy","350"); hubOv.setAttribute("r","90");
  hubOv.setAttribute("fill","none"); hubOv.setAttribute("stroke","none");
  hubOv.style.cssText = "opacity:0;transition:opacity .4s";
  wheelSvg.appendChild(hubOv);
  const hubTitle = document.createElementNS(svgns,"text");
  hubTitle.setAttribute("id","hub-title"); hubTitle.setAttribute("x","340"); hubTitle.setAttribute("y","342");
  hubTitle.setAttribute("text-anchor","middle"); hubTitle.setAttribute("dominant-baseline","central");
  hubTitle.style.cssText = "font-size:15px;font-weight:700;font-family:var(--font-serif);fill:var(--text-secondary)";
  hubTitle.textContent = data.hub.label;
  wheelSvg.appendChild(hubTitle);
  const hubSub = document.createElementNS(svgns,"text");
  hubSub.setAttribute("id","hub-sub"); hubSub.setAttribute("x","340"); hubSub.setAttribute("y","364");
  hubSub.setAttribute("text-anchor","middle"); hubSub.setAttribute("dominant-baseline","central");
  hubSub.style.cssText = "font-size:12px;font-family:var(--font-sans);fill:var(--text-secondary)";
  hubSub.textContent = data.hub.subBefore;
  wheelSvg.appendChild(hubSub);

  WEDGES.forEach(w => {
    const div = data.divisions[w.key];
    const hasSub = !!div.sub;
    const title = document.createElementNS(svgns,"text");
    title.setAttribute("id", w.key+"-title"); title.setAttribute("x", w.lx); title.setAttribute("y", hasSub ? w.ly-11 : w.ly);
    title.setAttribute("text-anchor","middle"); title.setAttribute("dominant-baseline","central");
    title.style.cssText = "font-size:14.5px;font-weight:700;font-family:var(--font-serif);fill:var(--text-secondary)";
    title.textContent = div.label;
    wheelSvg.appendChild(title);
    const sub = document.createElementNS(svgns,"text");
    sub.setAttribute("id", w.key+"-sub"); sub.setAttribute("x", w.lx); sub.setAttribute("y", w.ly+11);
    sub.setAttribute("text-anchor","middle"); sub.setAttribute("dominant-baseline","central");
    sub.style.cssText = "font-size:12px;font-family:var(--font-sans);fill:var(--text-secondary)";
    sub.textContent = div.sub || "";
    wheelSvg.appendChild(sub);
  });

  wheelShell.appendChild(wheelSvg);

  const heading = el("div", "deliverables-heading");
  heading.appendChild(el("span", null, "Core deliverables"));
  heading.appendChild(el("span", null, ""));
  heading.lastChild.id = "deliverablesCount";
  listCol.appendChild(heading);
  const msPanel = el("div"); msPanel.id = "msPanel";
  listCol.appendChild(msPanel);

  const cn = el("div","coming-next");
  cn.id = "comingNext";
  cn.style.display = "none";
  cn.appendChild(el("p",null,"Coming next (year 2 and beyond)"));
  const ul = el("ul");
  data.comingNext.forEach(item => ul.appendChild(el("li", null, esc(item))));
  cn.appendChild(ul);
  listCol.appendChild(cn);

  function setSector(key, state, ramp) {
    const ov = document.getElementById("ov-"+key);
    const title = document.getElementById(key+"-title");
    const sub = document.getElementById(key+"-sub");
    if (state === "complete") {
      ov.style.fill = ramp.fill; ov.style.stroke = ramp.stroke; ov.style.opacity = "1";
      title.style.fill = ramp.title; sub.style.fill = ramp.sub;
    } else if (state === "progress") {
      ov.style.fill = "url(#hatch-accent)"; ov.style.stroke = ramp.stroke; ov.style.opacity = "1";
      title.style.fill = ramp.stroke; sub.style.fill = "var(--text-secondary)";
    } else {
      ov.style.fill = "none"; ov.style.stroke = "none"; ov.style.opacity = "0";
      title.style.fill = "var(--text-secondary)"; sub.style.fill = "var(--text-secondary)";
    }
  }

  function renderTimeline(phase) {
    data.phases.forEach((p, idx) => {
      const c = document.getElementById("stop-"+p.phase);
      if (p.phase < phase) { c.setAttribute("r","7"); c.setAttribute("fill", RAMPS.accent.stroke); c.setAttribute("stroke", RAMPS.accent.stroke); c.setAttribute("stroke-width","1"); }
      else if (p.phase === phase) { c.setAttribute("r","10"); c.setAttribute("fill", RAMPS.accent.fill); c.setAttribute("stroke", RAMPS.accent.stroke); c.setAttribute("stroke-width","2"); }
      else { c.setAttribute("r","7"); c.setAttribute("fill","var(--surface-1)"); c.setAttribute("stroke","var(--border-strong)"); c.setAttribute("stroke-width","1"); }
    });
    document.getElementById("tl-progress").setAttribute("x2", 40 + (phase-1) * step);
  }

  const totalItems = data.phases.reduce((sum, p) => sum + p.items.length, 0);

  function setPhase(phase) {
    phase = Math.min(nStops, Math.max(1, Math.round(phase)));
    const p = data.phases[phase-1];
    phaseLabel.textContent = "Phase " + phase + " (" + p.range + ")";
    Object.keys(data.divisions).forEach(key => {
      const div = data.divisions[key];
      let state = "dormant";
      if (phase >= div.threshold) state = "complete";
      else if (div.progressAt && phase >= div.progressAt) state = "progress";
      setSector(key, state, RAMPS[div.style]);
    });
    const itemsSoFar = data.phases.slice(0, phase).reduce((sum, ph) => sum + ph.items.length, 0);
    const pct = Math.round(itemsSoFar/totalItems*100);
    document.getElementById("ecoPct").textContent = pct + "%";
    document.getElementById("thermoFill").style.height = pct + "%";
    setSector("hub", phase >= data.hub.threshold ? "complete" : "dormant", RAMPS.accent);
    document.getElementById("hub-sub").textContent = phase >= data.hub.osThreshold ? data.hub.subAfter : data.hub.subBefore;

    msPanel.innerHTML = p.items.map(ms =>
      '<div class="ms-item"><p class="ms-tag">' + esc(data.divLabel[ms.tag]) + '</p><p class="ms-title">' + esc(ms.title) + '</p><p class="ms-detail">' + esc(ms.detail) + '</p></div>'
    ).join("");
    document.getElementById("deliverablesCount").textContent = p.items.length + " for this phase";

    const isFinal = phase === nStops;
    document.getElementById("comingNext").style.display = isFinal ? "block" : "none";
    document.getElementById("finalBanner").classList.toggle("show", isFinal);
    document.getElementById("wheelCol").classList.toggle("complete", isFinal);

    renderTimeline(phase);
  }

  let dragging = false;
  function xToPhase(clientX) {
    const rect = tlSvg.getBoundingClientRect();
    const scale = 1120 / rect.width;
    const x = (clientX - rect.left) * scale;
    return 1 + (x - 40) / step;
  }
  tlSvg.addEventListener("pointerdown", e => { dragging = true; tlSvg.setPointerCapture(e.pointerId); setPhase(xToPhase(e.clientX)); });
  tlSvg.addEventListener("pointermove", e => { if (dragging) setPhase(xToPhase(e.clientX)); });
  tlSvg.addEventListener("pointerup", () => { dragging = false; });
  tlSvg.addEventListener("pointercancel", () => { dragging = false; });

  setPhase(1);
}

function buildRestructure(container, data) {
  container.innerHTML = "";
  const r = data.restructure;

  container.appendChild(el("p", "eyebrow reveal", r.eyebrow));
  container.appendChild(el("h1", "reveal", r.headline));
  container.appendChild(el("p", "subtitle reveal", r.subtitle));

  const row = el("div", "restructure-row reveal");
  container.appendChild(row);
  const stageCol = el("div");
  const visionCol = el("div");
  row.appendChild(stageCol);
  row.appendChild(visionCol);

  const stage = el("div", "stage");
  stageCol.appendChild(stage);

  const svg = document.createElementNS(svgns, "svg");
  svg.setAttribute("class", "stage-wheel"); svg.setAttribute("viewBox", "0 0 680 630");
  WEDGES.forEach(w => {
    const p = document.createElementNS(svgns, "path");
    p.setAttribute("d", w.d);
    const ramp = RAMPS[data.divisions[w.key].style];
    p.setAttribute("fill", ramp.fill); p.setAttribute("stroke", ramp.stroke); p.setAttribute("stroke-width", "1");
    svg.appendChild(p);
  });
  const hubShape = document.createElementNS(svgns, "circle");
  hubShape.setAttribute("cx", "340"); hubShape.setAttribute("cy", "350"); hubShape.setAttribute("r", "90");
  hubShape.setAttribute("fill", RAMPS.accent.fill); hubShape.setAttribute("stroke", RAMPS.accent.stroke); hubShape.setAttribute("stroke-width", "1");
  svg.appendChild(hubShape);
  stage.appendChild(svg);

  const chipEls = {};
  r.scattered.forEach(item => {
    const pos = el("div", "chip-pos");
    pos.style.left = (item.x / 680 * 100) + "%";
    pos.style.top = (item.y / 630 * 100) + "%";
    const chip = el("div", "chip", esc(item.label));
    chip.style.setProperty("--rot", item.rot + "deg");
    pos.appendChild(chip);
    if (item.key === "portfolio") {
      pos.appendChild(el("div", "chip-tag", "Portfolio"));
    }
    stage.appendChild(pos);
    chipEls[item.key] = { pos, chip };
  });

  const targets = { hub: { x: 340, y: 350 } };
  WEDGES.forEach(w => { targets[w.key] = { x: w.lx, y: w.ly }; });

  const newChipEls = {};
  r.newKeys.forEach(key => {
    const t = targets[key];
    const pos = el("div", "new-chip-pos");
    pos.style.left = (t.x / 680 * 100) + "%";
    pos.style.top = (t.y / 630 * 100) + "%";
    const chip = el("div", "chip", esc(data.divisions[key].label));
    const badge = el("div", "new-badge", "NEW");
    pos.appendChild(chip); pos.appendChild(badge);
    stage.appendChild(pos);
    newChipEls[key] = pos;
  });

  const caption = el("div", "stage-caption", esc(r.beforeCaption));
  stageCol.appendChild(caption);
  const btn = el("button", "restructure-btn magnetic", "Restructure");
  stageCol.appendChild(btn);

  const vc = el("div", "vision-card");
  vc.appendChild(el("p", "vc-heading", "The vision"));
  const ul = el("ul");
  r.vision.forEach(v => ul.appendChild(el("li", null, esc(v))));
  vc.appendChild(ul);
  visionCol.appendChild(vc);

  let restructured = false;
  function applyState(on) {
    stage.classList.toggle("restructured", on);
    r.scattered.forEach(item => {
      const { pos, chip } = chipEls[item.key];
      const t = on ? targets[item.key] : { x: item.x, y: item.y };
      pos.style.left = (t.x / 680 * 100) + "%";
      pos.style.top = (t.y / 630 * 100) + "%";
      if (on) {
        // HelpBnk genuinely becomes Dream App; everyone else keeps its own name and
        // simply moves under its wedge (DreamBrew stays DreamBrew, tagged Portfolio).
        const ramp = item.key === "hub" ? RAMPS.accent : RAMPS[data.divisions[item.key].style];
        chip.style.background = ramp.fill; chip.style.borderColor = ramp.stroke; chip.style.color = ramp.title;
        if (item.key === "hub") chip.textContent = data.hub.label;
      } else {
        chip.style.background = ""; chip.style.borderColor = ""; chip.style.color = "";
        chip.textContent = item.label;
      }
    });
    Object.values(newChipEls).forEach(pos => {
      pos.classList.remove("show");
      pos.querySelector(".chip").classList.remove("chip-glow");
    });
    caption.textContent = on ? "" : r.beforeCaption;
    btn.textContent = on ? "Reset" : "Restructure";
    btn.classList.toggle("is-reset", on);

    if (on) {
      r.newKeys.forEach((key, i) => {
        setTimeout(() => {
          const pos = newChipEls[key];
          pos.classList.add("show");
          const chip = pos.querySelector(".chip");
          const ramp = RAMPS[data.divisions[key].style];
          chip.style.background = ramp.fill; chip.style.borderColor = ramp.stroke; chip.style.color = ramp.title;
          chip.classList.add("chip-glow");
        }, 1300 + i * 300);
      });
      setTimeout(() => { caption.textContent = r.afterCaption; }, 1300 + r.newKeys.length * 300 + 300);
    }
  }

  btn.addEventListener("click", () => { restructured = !restructured; applyState(restructured); });
  applyState(false);
}

/* ---------- Cool-but-restrained motion layer ---------- */
function initEffects() {
  // Scroll reveal
  const revealEls = document.querySelectorAll(".reveal");
  if (prefersReduced) {
    revealEls.forEach(e => e.classList.add("is-visible"));
  } else if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(e => io.observe(e));
  } else {
    revealEls.forEach(e => e.classList.add("is-visible"));
  }

  // Scrollspy nav
  const sections = [document.getElementById("restructure"), document.getElementById("roadmap")].filter(Boolean);
  const navLinks = Array.from(document.querySelectorAll("#siteNav a"));
  if (sections.length && navLinks.length && "IntersectionObserver" in window) {
    const spy = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.toggle("active", a.getAttribute("href") === "#" + entry.target.id));
        }
      });
    }, { rootMargin: "-45% 0px -50% 0px" });
    sections.forEach(s => spy.observe(s));
  }
  navLinks.forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      const target = document.querySelector(a.getAttribute("href"));
      if (target) target.scrollIntoView({ behavior: prefersReduced ? "auto" : "smooth", block: "start" });
    });
  });

  // Scroll progress bar
  const bar = document.getElementById("scrollProgress");
  let ticking = false;
  function updateProgress() {
    const h = document.documentElement;
    const max = h.scrollHeight - h.clientHeight;
    bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + "%";
    ticking = false;
  }
  window.addEventListener("scroll", () => { if (!ticking) { requestAnimationFrame(updateProgress); ticking = true; } }, { passive: true });
  updateProgress();

  initCursor();
  initMagnetic();
}

function initCursor() {
  if (prefersReduced || window.matchMedia("(pointer: coarse)").matches) return;
  const dot = document.getElementById("cursorDot");
  let shown = false;
  window.addEventListener("mousemove", e => {
    if (!shown) { dot.classList.add("active"); shown = true; }
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
    const target = e.target.closest("button, a, .chip");
    dot.classList.toggle("hover", !!target);
  }, { passive: true });
  window.addEventListener("mouseleave", () => dot.classList.remove("active"));
}

function initMagnetic() {
  if (prefersReduced || window.matchMedia("(pointer: coarse)").matches) return;
  document.querySelectorAll(".magnetic").forEach(elm => {
    elm.style.transition = elm.style.transition || "transform .3s var(--ease)";
    elm.addEventListener("mousemove", e => {
      const rect = elm.getBoundingClientRect();
      const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
      const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
      elm.style.transform = "translate(" + x.toFixed(1) + "px," + y.toFixed(1) + "px)";
    });
    elm.addEventListener("mouseleave", () => { elm.style.transform = "translate(0,0)"; });
  });
}

/* ---------- Decryption (in-browser, password never leaves the device) ---------- */
const PW_KEY = "dream_roadmap_pw";
async function decryptRoadmap(enc, password) {
  const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: dec(enc.salt), iterations: enc.iter, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const buf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: dec(enc.iv) }, key, dec(enc.ct));
  return JSON.parse(new TextDecoder().decode(buf));
}

function showError(msg) {
  document.getElementById("app").innerHTML = '<div class="gate-wrap"><p style="color:#a53a24">' + esc(msg) + '</p></div>';
}

function showGate(enc) {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const wrap = el("div", "gate-wrap");
  const g = el("div", "gate");
  g.appendChild(el("div", "lock", "🔒"));
  g.appendChild(el("h2", null, "Dream: restructure &amp; roadmap"));
  g.appendChild(el("p", null, "Enter the password to unlock. It decrypts on this device only."));
  const input = el("input");
  input.type = "password"; input.placeholder = "Password"; input.autocomplete = "current-password";
  const btn = el("button", null, "Unlock");
  const err = el("div", "err");
  const remember = el("input"); remember.type = "checkbox"; remember.checked = true;
  const rememberLabel = el("label"); rememberLabel.appendChild(remember); rememberLabel.appendChild(document.createTextNode("Remember on this device"));
  g.appendChild(input); g.appendChild(btn); g.appendChild(err); g.appendChild(rememberLabel);
  wrap.appendChild(g);
  app.appendChild(wrap);
  input.focus();

  const attempt = async () => {
    err.textContent = ""; btn.textContent = "Unlocking...";
    try {
      const d = await decryptRoadmap(enc, input.value);
      if (remember.checked) localStorage.setItem(PW_KEY, input.value);
      render(d);
      const foot = document.getElementById("foot");
      foot.innerHTML = (foot.textContent ? foot.textContent + " · " : "") + '<a id="lockLink">Lock</a>';
      document.getElementById("lockLink").addEventListener("click", () => { localStorage.removeItem(PW_KEY); location.reload(); });
    } catch (e) {
      btn.textContent = "Unlock";
      err.textContent = "Wrong password, try again.";
      input.select();
    }
  };
  btn.addEventListener("click", attempt);
  input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
}

async function boot() {
  let enc;
  try {
    enc = await fetch("data/roadmap.enc.json?v=" + Date.now()).then(r => { if (!r.ok) throw new Error(); return r.json(); });
  } catch (e) {
    showError("Could not load the roadmap data. It may not have been published yet.");
    return;
  }
  const saved = localStorage.getItem(PW_KEY);
  if (saved) {
    try {
      render(await decryptRoadmap(enc, saved));
      const foot = document.getElementById("foot");
      foot.innerHTML = (foot.textContent ? foot.textContent + " · " : "") + '<a id="lockLink">Lock</a>';
      document.getElementById("lockLink").addEventListener("click", () => { localStorage.removeItem(PW_KEY); location.reload(); });
      return;
    } catch (e) { localStorage.removeItem(PW_KEY); }
  }
  showGate(enc);
}
boot();
