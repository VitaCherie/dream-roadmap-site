<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dream" />
<meta name="theme-color" content="#FFFFFF" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Dream: Restructure &amp; Roadmap</title>
<style>
  /*
    Brand tokens from Dream Brand Guidelines, July 2026.
    Primary palette: Vivid Orange #ff5b00, Burnt Coffee #422d23, Grey #f4f4f4, White #ffffff.
    Backgrounds use Grey and White only (primary palette) -- never a secondary colour, per guidelines section 2.3.
    Secondary palette (used sparingly, precedence order): Electric Mint #0dc499, Sky Blue #1773e0,
    Pomegranate #c80045, Fuel Yellow #f9c770, Dark Teal #176161, Iceberg Blue #8bb9c6.
    This page is "for internal use only" (a deck/presentation), so per section 3.3 it uses the
    secondary font pairing -- Georgia (headings) + Calibri (body) -- not the core Richmond
    Display / Source Sans Variable pairing, which is reserved for external, professionally-printed
    materials.
    Type is left-aligned throughout, per the guidelines.
  */
  :root {
    --bg: #FFFFFF;
    --surface-1: #FFFFFF;
    --surface-2: #F4F4F4;
    --border: rgba(66,45,35,.14);
    --border-strong: rgba(66,45,35,.30);
    --text-primary: #422D23;
    --text-secondary: rgba(66,45,35,.72);
    --text-muted: rgba(66,45,35,.52);
    --accent: #FF5B00;
    --accent-soft: #FFE3CC;
    --accent-dark: #E14E00;
    --wheel-dormant-fill: #ECECEC;
    --wheel-dormant-stroke: rgba(66,45,35,.24);
    --font-serif: Georgia, "Times New Roman", serif;
    --font-sans: Calibri, Candara, Segoe, "Segoe UI", Optima, Arial, sans-serif;
    --shadow: 3px 3px 0 rgba(66,45,35,0.08);
    --ease: cubic-bezier(.22,1,.36,1);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased; line-height: 1.4;
    cursor: default;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 20px; }
  .eyebrow { font-size: 12px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 6px; text-align: left; }
  h1 { font-family: var(--font-serif); font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -0.2px; text-align: left; }
  h1 em { color: var(--accent-dark); font-style: italic; }
  .subtitle { color: var(--text-secondary); font-size: 14px; margin: 10px 0 0; line-height: 1.55; text-align: left; max-width: 46em; }

  #grain { position: fixed; inset: 0; pointer-events: none; z-index: 60; opacity: .035; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  #scrollProgress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--accent); z-index: 70; transition: width .1s linear; }

  #cursorDot { position: fixed; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--accent); pointer-events: none; z-index: 65; transform: translate(-50%,-50%); transition: width .25s var(--ease), height .25s var(--ease), background .25s var(--ease), opacity .3s; opacity: 0; }
  #cursorDot.active { opacity: 1; }
  #cursorDot.hover { width: 34px; height: 34px; background: rgba(255,91,0,.14); }
  @media (pointer: coarse) { #cursorDot { display: none; } }

  header.site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.86); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: max(env(safe-area-inset-top), 14px) 0 14px; }
  header .wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .logo-mark { height: 30px; width: auto; display: block; }
  .site-nav { display: flex; gap: 6px; flex-wrap: wrap; }
  .site-nav a { font-family: var(--font-sans); font-weight: 700; font-size: 12px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: background .3s, color .3s, border-color .3s, transform .3s var(--ease); display: inline-block; }
  .site-nav a.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  main { display: block; }
  section.section { padding: 56px 0 64px; scroll-margin-top: 78px; }
  section.section.alt { background: var(--surface-2); }
  section.section + section.section { border-top: 1px solid var(--border); }

  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1 !important; transform: none !important; transition: none !important; } }

  /* Cover */
  .cover-section { min-height: 62vh; display: flex; flex-direction: column; justify-content: center; }
  .cover-section h1 { font-size: 46px; line-height: 1.08; }
  .cover-meta { margin-top: 22px; font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; }
  @media (max-width: 700px) { .cover-section h1 { font-size: 32px; } }

  /* Info cards (intro) */
  .info-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .info-card h3 { font-family: var(--font-serif); font-size: 16px; margin: 0 0 8px; }
  .info-card p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.6; margin: 0; }
  .info-card ul { margin: 0; padding-left: 18px; font-size: 13.5px; color: var(--text-secondary); line-height: 1.7; }
  .info-card ul li::marker { color: var(--accent); }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 0 20px; margin-top: 1.25rem; }

  /* Stats */
  .stats-row { display: flex; gap: 28px; flex-wrap: wrap; margin: 22px 0 4px; }
  .stat { flex: 1; min-width: 150px; }
  .stat-num { font-family: var(--font-serif); font-weight: 700; font-size: 36px; color: var(--accent-dark); line-height: 1; }
  .stat-label { font-size: 12.5px; color: var(--text-secondary); margin-top: 7px; line-height: 1.4; }

  .phase-label { font-size: 15px; font-weight: 700; margin: 28px 0 8px; }

  .final-banner { display: none; background: var(--text-primary); color: #fff; border-radius: 14px; padding: 18px 22px; margin: 1.1rem 0 1.25rem; box-shadow: var(--shadow); }
  .final-banner.show { display: block; }
  .final-banner .big { font-family: var(--font-serif); font-size: 21px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.2px; }
  .final-banner .small { font-size: 13.5px; margin: 0; opacity: 0.88; }

  .main-row { display: grid; grid-template-columns: minmax(380px, 620px) 1fr; gap: 32px; align-items: start; margin-top: 1.25rem; }
  @media (max-width: 900px) { .main-row { grid-template-columns: 1fr; } .list-col { max-height: none !important; overflow: visible !important; } }
  .list-col { max-height: 660px; overflow-y: auto; padding-right: 4px; }

  .wheel-row { display: flex; flex-direction: row; align-items: stretch; gap: 16px; }
  .wheel-shell { flex: 1; min-width: 0; transition: filter .5s; }
  .wheel-shell.complete { filter: drop-shadow(0 0 22px rgba(255,91,0,0.35)); }

  .thermo-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 34px; flex-shrink: 0; }
  .thermo-label { font-family: var(--font-serif); font-weight: 700; font-size: 15px; color: var(--accent-dark); }
  .thermo-track { flex: 1; width: 22px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; box-shadow: inset 0 1px 3px rgba(66,45,35,0.08); }
  .thermo-fill { width: 100%; background: var(--accent); border-radius: 11px; transition: height .5s; }
  .thermo-cap { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

  .deliverables-heading { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 12px; }
  .deliverables-heading span:first-child { font-size: 13px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 0.8px; }
  .deliverables-heading span:last-child { font-size: 12px; color: var(--text-muted); }
  .ms-item { background: var(--surface-1); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .ms-tag { display: inline-block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--accent-dark); background: var(--accent-soft); padding: 2px 8px; border-radius: 20px; margin: 0 0 6px; }
  .ms-title { font-size: 15px; font-weight: 700; margin: 0 0 3px; }
  .ms-detail { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.5; }

  .coming-next { margin-top: 0.5rem; border: 1px dashed var(--border-strong); border-radius: 12px; padding: 1rem 1.25rem; background: var(--surface-1); }
  .coming-next p { font-size: 14px; font-weight: 700; margin: 0 0 8px; }
  .coming-next ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
  footer { text-align: left; color: var(--text-muted); font-size: 11px; padding: 24px 20px max(env(safe-area-inset-bottom), 24px); }
  footer a { color: var(--text-muted); text-decoration: underline; cursor: pointer; }

  /* Future (3/5yr) */
  .future-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 20px; margin-top: 20px; }
  .future-card { border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; background: var(--surface-1); box-shadow: var(--shadow); }
  .future-year { font-family: var(--font-serif); font-size: 13px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: .5px; margin: 0 0 8px; }
  .future-headline { font-family: var(--font-serif); font-size: 19px; font-weight: 700; margin: 0 0 6px; }
  .future-detail { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin: 0; }

  /* Restructure section */
  .restructure-row { display: grid; grid-template-columns: minmax(380px, 620px) 1fr; gap: 32px; align-items: start; margin-top: 1.1rem; }
  @media (max-width: 900px) { .restructure-row { grid-template-columns: 1fr; } }
  .stage { position: relative; width: 100%; aspect-ratio: 680 / 680; }
  .stage svg.stage-wheel { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1.1s ease; }
  .stage.restructured svg.stage-wheel { opacity: 1; }
  /* chip-pos/new-chip-pos get an explicit width/height (set inline, as a %
     of the 680-unit viewBox) so floating logos scale with the wheel at any
     stage width instead of overflowing it at fixed pixel sizes. */
  .chip-pos { position: absolute; transform: translate(-50%, -50%); transition: left 1.3s var(--ease), top 1.3s var(--ease); }
  .chip { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; animation: chipFloat 4s ease-in-out infinite; filter: drop-shadow(2px 3px 3px rgba(66,45,35,0.15)); }
  .stage.restructured .chip { animation: none; }
  @keyframes chipFloat { 0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); } 50% { transform: translateY(-8px) rotate(var(--rot, 0deg)); } }
  .chip-logo { width: 100%; height: 100%; object-fit: contain; display: block; }
  .chip-wordmark { font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 13.5px; color: var(--text-primary); white-space: nowrap; }
  .chip-tag { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 5px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--accent-dark); background: var(--accent-soft); padding: 2px 8px; border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity .4s ease; }
  .stage.restructured .chip-tag { opacity: 1; transition: opacity .5s ease 1.05s; }
  .new-chip-pos { position: absolute; transform: translate(-50%, -50%) scale(0); transition: transform .55s cubic-bezier(.34,1.56,.64,1); }
  .new-chip-pos.show { transform: translate(-50%, -50%) scale(1); }
  .new-chip-pos .chip { animation: none; }
  .new-badge { position: absolute; top: -14px; right: -14px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: .3px; padding: 2px 6px; border-radius: 20px; box-shadow: var(--shadow); font-family: var(--font-sans); }
  .chip-glow { animation: glowPulse 1.3s ease-out 2; }
  @keyframes glowPulse { 0% { box-shadow: 0 0 0 0 rgba(255,91,0,.5); } 100% { box-shadow: 0 0 0 20px rgba(255,91,0,0); } }
  .restructure-btn { margin-top: 20px; padding: 12px 22px; font-size: 14px; font-weight: 700; font-family: var(--font-sans); color: #fff; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; box-shadow: var(--shadow); transition: transform .3s var(--ease), background .3s; }
  .restructure-btn.is-reset { background: var(--text-primary); }
  .stage-caption { margin-top: 14px; font-size: 13.5px; color: var(--text-secondary); min-height: 20px; }
  .vision-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow); }
  .vision-card p.vc-heading { font-size: 13px; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: 0.8px; margin: 0 0 12px; }
  .vision-card p.vc-intro { font-size: 14.5px; font-weight: 700; color: var(--text-primary); margin: 0 0 18px; }
  .vision-card .stats-row { display: flex; flex-direction: column; gap: 16px; margin: 0; }
  .vision-card .stat-num { font-size: 30px; }
  .vision-card .stat + .stat { padding-top: 16px; border-top: 1px solid var(--border); }
  @media (max-width: 480px) {
    .chip-wordmark { font-size: 11px; }
    .chip-tag { font-size: 8px; padding: 1px 6px; }
    .new-badge { font-size: 7.5px; padding: 1px 4px; top: -7px; right: -11px; }
  }

  /* Org chart */
  .org-standalone { margin-top: 3rem; max-width: 760px; }
  .org-svg { display: block; margin-top: 1.5rem; }

  /* Journey: path tabs + phone mockups */
  .path-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.5rem; }
  .path-tab { font-family: var(--font-sans); font-weight: 700; font-size: 12.5px; padding: 9px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; transition: background .3s, color .3s, border-color .3s; }
  .path-tab.active { background: var(--text-primary); border-color: var(--text-primary); color: #fff; }
  .phone-row { display: flex; gap: 18px; overflow-x: auto; padding: 6px 2px 14px; margin-top: 22px; }
  .phone { flex: 0 0 148px; width: 148px; }
  .phone-frame { background: var(--text-primary); border-radius: 22px; padding: 8px; box-shadow: var(--shadow); }
  .phone-screen { background: #fff; border-radius: 15px; aspect-ratio: 9 / 18; overflow: hidden; display: flex; flex-direction: column; }
  .phone-caption { margin-top: 10px; font-size: 11.5px; color: var(--text-secondary); line-height: 1.4; text-align: center; }

  .scr-social { display: flex; flex-direction: column; height: 100%; }
  .scr-social-header { font-family: var(--font-serif); font-weight: 700; font-size: 11px; color: var(--accent-dark); padding: 10px 10px 6px; }
  .scr-video { flex: 1; background: linear-gradient(160deg, var(--accent-soft), var(--border)); display: flex; align-items: center; justify-content: center; }
  .scr-play { width: 30px; height: 30px; border-radius: 50%; background: #fff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; box-shadow: var(--shadow); }
  .scr-social-caption { font-size: 10px; color: var(--text-secondary); padding: 8px 10px; margin: 0; line-height: 1.4; }

  .scr-ad { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 14px; text-align: center; gap: 10px; background: var(--surface-2); }
  .scr-tag { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); background: #fff; padding: 2px 8px; border-radius: 10px; }
  .scr-ad-mark img { height: 26px; }
  .scr-ad-text { font-size: 11px; font-weight: 700; color: var(--text-primary); margin: 0; line-height: 1.3; }
  .scr-cta { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 6px 16px; border-radius: 16px; }

  .scr-chat { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; padding: 12px; gap: 8px; background: var(--surface-2); }
  .scr-bubble { background: #fff; border-radius: 12px; padding: 8px 11px; font-size: 10px; color: var(--text-primary); align-self: flex-start; box-shadow: var(--shadow); }
  .scr-bubble.scr-link { display: flex; align-items: center; gap: 6px; font-weight: 700; color: var(--accent-dark); }
  .scr-bubble.scr-link img { height: 12px; }

  .scr-home { display: flex; flex-direction: column; height: 100%; padding: 14px 10px; background: var(--surface-2); }
  .scr-app-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-content: center; }
  .scr-tile { aspect-ratio: 1; background: var(--border); border-radius: 8px; }
  .scr-tile--app { background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 2px var(--accent); }
  .scr-tile--app img { width: 70%; }
  .scr-tap-hint { font-size: 9px; color: var(--text-muted); text-align: center; margin: 8px 0 0; }

  .scr-menu { display: flex; flex-direction: column; height: 100%; padding: 14px 12px; gap: 4px; }
  .scr-menu-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); margin: 0 0 8px; }
  .scr-menu-item { font-size: 10.5px; font-weight: 700; color: rgba(255,91,0,.4); padding: 8px 8px; border-radius: 8px; }
  .scr-menu-item.is-on { background: var(--accent-soft); color: var(--accent); }

  .scr-dashboard { display: flex; flex-direction: column; justify-content: center; height: 100%; padding: 16px; gap: 8px; }
  .scr-dash-label { font-size: 10px; color: var(--text-muted); margin: 0; text-transform: uppercase; letter-spacing: .3px; }
  .scr-progress-track { height: 8px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .scr-progress-fill { height: 100%; background: var(--accent); border-radius: 6px; }
  .scr-dash-value { font-size: 12px; font-weight: 700; color: var(--text-primary); margin: 0; }

  .scr-retain { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 16px; gap: 10px; text-align: center; }
  .scr-badge { font-size: 10.5px; font-weight: 700; color: var(--accent-dark); background: var(--accent-soft); padding: 6px 12px; border-radius: 14px; }
  .scr-retain-text { font-size: 10.5px; color: var(--text-secondary); margin: 0; line-height: 1.4; }
  .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 32px; }
  @media (max-width: 700px) { .compare-row { grid-template-columns: 1fr; } }
  .compare-card { border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; background: var(--surface-1); }
  .compare-card.future-state { border-color: var(--accent); background: var(--accent-soft); }
  .compare-card .cc-label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--accent-dark); margin: 0 0 8px; }
  .compare-card .cc-body { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.55; }

  /* Resource callouts + hub */
  .resources-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 20px; margin-top: 24px; }
  .resource-card { border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; background: var(--surface-1); box-shadow: var(--shadow); }
  .resource-card h3 { font-family: var(--font-serif); font-size: 17px; margin: 0 0 6px; }
  .resource-card p { font-size: 13.5px; color: var(--text-secondary); margin: 0 0 14px; line-height: 1.5; }
  .res-btn { display: inline-block; font-weight: 700; font-size: 13px; padding: 8px 16px; border-radius: 20px; text-decoration: none; }
  a.res-btn { background: var(--accent); color: #fff; }
  span.res-btn { background: var(--border); color: var(--text-muted); cursor: default; }

  /* Conclusion */
  .asks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 18px; margin-top: 22px; }
  .ask-card { border-left: 4px solid var(--accent); background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); }
  .ask-num { font-family: var(--font-serif); font-size: 24px; font-weight: 700; color: var(--accent-dark); }
  .ask-title { font-weight: 700; font-size: 14.5px; margin: 8px 0 4px; }
  .ask-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin: 0; }
  .closing-banner { background: var(--text-primary); color: #fff; border-radius: 16px; padding: 28px 30px; margin-top: 32px; box-shadow: var(--shadow); }
  .closing-banner .cb-quote { font-family: var(--font-serif); font-size: 28px; font-weight: 700; margin: 0 0 10px; }
  .closing-banner .cb-quote em { color: var(--accent); font-style: italic; }
  .closing-banner .cb-body { font-size: 14px; line-height: 1.6; margin: 0; opacity: .9; }

  /* Password gate */
  .gate-wrap { padding: max(env(safe-area-inset-top), 18px) 20px 40px; }
  .gate { max-width: 340px; margin: 12vh auto 0; text-align: left; }
  .gate .lock { font-size: 34px; }
  .gate h2 { font-family: var(--font-serif); font-size: 20px; margin: 12px 0 4px; }
  .gate p { color: var(--text-secondary); font-size: 13px; margin: 0 0 18px; line-height: 1.5; }
  .gate input[type="password"] { width: 100%; padding: 13px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-1); color: var(--text-primary); box-shadow: var(--shadow); font-family: var(--font-sans); }
  .gate input[type="password"]:focus { outline: none; border-color: var(--accent); }
  .gate input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); }
  .gate button { width: 100%; margin-top: 10px; padding: 13px; font-size: 15px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; font-family: var(--font-sans); transition: transform .3s var(--ease); }
  .gate button:active { transform: scale(0.98); }
  .gate .err { color: #a53a24; font-size: 13px; margin-top: 12px; min-height: 16px; }
  .gate label { display: flex; gap: 7px; align-items: center; margin-top: 14px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
</style>
</head>
<body>
<div id="grain"></div>
<div id="cursorDot"></div>
<div id="scrollProgress"></div>
<header class="site-header">
  <div class="wrap">
    <img src="dream-logo.png" alt="Dream" class="logo-mark" />
    <nav class="site-nav" id="siteNav" hidden></nav>
  </div>
</header>
<main id="app">
  <div class="gate-wrap"><p style="color:var(--text-muted)">Loading&hellip;</p></div>
</main>
<footer id="foot"></footer>

<script>
const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
const esc = s => (s || "").replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
const svgns = "http://www.w3.org/2000/svg";
const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

const WEDGES = [
  {key:'tools',     d:'M340,55 A285,285 0 0,1 625,340 L525,340 A185,185 0 0,0 340,155 Z', lx:506.17, ly:173.83},
  {key:'media',     d:'M625,340 A285,285 0 0,1 340,625 L340,525 A185,185 0 0,0 525,340 Z', lx:506.17, ly:506.17},
  {key:'funding',   d:'M340,625 A285,285 0 0,1 55,340 L155,340 A185,185 0 0,0 340,525 Z', lx:173.83, ly:506.17},
  {key:'portfolio', d:'M55,340 A285,285 0 0,1 340,55 L340,155 A185,185 0 0,0 155,340 Z', lx:173.83, ly:173.83}
];

// The gap ring between the hub and the four pillars: Physical Spaces isn't
// its own pillar, so instead of one wedge it fills all four quarters of the
// gap equally, signalling "not yet consolidated, could sit under any of them".
const SPACES_WEDGES = [
  {d:'M340,155 A185,185 0 0,1 525,340 L480,340 A140,140 0 0,0 340,200 Z', lx:454.9, ly:225.1},
  {d:'M525,340 A185,185 0 0,1 340,525 L340,480 A140,140 0 0,0 480,340 Z', lx:454.9, ly:454.9},
  {d:'M340,525 A185,185 0 0,1 155,340 L200,340 A140,140 0 0,0 340,480 Z', lx:225.1, ly:454.9},
  {d:'M155,340 A185,185 0 0,1 340,155 L340,200 A140,140 0 0,0 200,340 Z', lx:225.1, ly:225.1}
];

// Ramps from Dream's official secondary palette (Brand Guidelines, July 2026).
// Media, Portfolio and the hub stay in the core Vivid Orange.
const RAMPS = {
  accent:    {fill:'#FFE3CC', stroke:'#FF5B00', title:'#E14E00', sub:'#C2470B'},
  banking:   {fill:'#E3EEFC', stroke:'#1773E0', title:'#125FB8', sub:'#1773E0'},
  community: {fill:'#DCF5EF', stroke:'#0DC499', title:'#0B8F6F', sub:'#0DC499'},
  fund:      {fill:'#F7E1E9', stroke:'#C80045', title:'#A30039', sub:'#C80045'}
};

// Native aspect ratios (w/h) of each logo file, used to fit every pillar logo
// into the same bounding box so no logo reads visually bigger than another.
// Dream App gets its own, larger box -- it's the one thing meant to dominate.
const LOGO_ASPECT = {
  hub: 1121/464, tools: 1199/378, media: 1223/608, funding: 1092/483, portfolio: 975/657
};
const PILLAR_BOX = {w: 160, h: 54};
const HUB_BOX = {w: 192, h: 90};
function fitBox(aspect, box) {
  let w = box.h * aspect, h = box.h;
  if (w > box.w) { w = box.w; h = box.w / aspect; }
  return {w, h};
}
// Same fit-box math, expressed as a % of the 680-unit viewBox, so the
// floating restructure chips scale with the wheel instead of overflowing it
// at a fixed pixel size on narrower stages.
function chipBoxPct(key) {
  const box = key === "hub" ? HUB_BOX : PILLAR_BOX;
  const dims = fitBox(LOGO_ASPECT[key], box);
  return { w: dims.w / 680 * 100, h: dims.h / 680 * 100 };
}

let DATA = null;

function makeChipContent(label, logoFile, big) {
  if (logoFile) {
    const img = el("img");
    img.src = "logos/" + logoFile; img.alt = label; img.className = "chip-logo" + (big ? " chip-logo--hub" : "");
    return img;
  }
  return el("span", "chip-wordmark", esc(label));
}

// Renders the full wheel (Physical Spaces ring, hub, four pillars) into an
// existing <svg>. Used identically by the roadmap wheel (mode "interactive",
// which needs id'd overlay paths for the phase-progress fill) and the
// restructure preview (mode "static", always shown fully realized) -- one
// function so the two can never drift apart again.
function renderWheelSVG(svgEl, data, mode) {
  const interactive = mode === "interactive";

  if (interactive) {
    const defs = document.createElementNS(svgns, "defs");
    const pattern = document.createElementNS(svgns, "pattern");
    pattern.setAttribute("id","hatch-accent"); pattern.setAttribute("width","7"); pattern.setAttribute("height","7");
    pattern.setAttribute("patternUnits","userSpaceOnUse"); pattern.setAttribute("patternTransform","rotate(45)");
    const hatchBg = document.createElementNS(svgns, "rect");
    hatchBg.setAttribute("width","7"); hatchBg.setAttribute("height","7"); hatchBg.setAttribute("fill","#E3EEFC");
    const hatchLine = document.createElementNS(svgns, "line");
    hatchLine.setAttribute("x1","0"); hatchLine.setAttribute("y1","0"); hatchLine.setAttribute("x2","0"); hatchLine.setAttribute("y2","7");
    hatchLine.setAttribute("stroke","#1773E0"); hatchLine.setAttribute("stroke-width","3");
    pattern.appendChild(hatchBg); pattern.appendChild(hatchLine);
    defs.appendChild(pattern);
    svgEl.appendChild(defs);
  }

  // pillar wedges
  WEDGES.forEach(w => {
    if (interactive) {
      const base = document.createElementNS(svgns,"path");
      base.setAttribute("d", w.d); base.setAttribute("fill","var(--wheel-dormant-fill)"); base.setAttribute("stroke","var(--wheel-dormant-stroke)"); base.setAttribute("stroke-width","0.5");
      svgEl.appendChild(base);
    } else {
      const p = document.createElementNS(svgns,"path");
      const ramp = RAMPS[data.divisions[w.key].style];
      p.setAttribute("d", w.d); p.setAttribute("fill", ramp.fill); p.setAttribute("stroke", ramp.stroke); p.setAttribute("stroke-width","1");
      svgEl.appendChild(p);
    }
  });
  if (interactive) {
    WEDGES.forEach(w => {
      const ov = document.createElementNS(svgns,"path");
      ov.setAttribute("id","ov-"+w.key); ov.setAttribute("d", w.d); ov.setAttribute("fill","none"); ov.setAttribute("stroke","none"); ov.setAttribute("stroke-width","1");
      ov.style.cssText = "opacity:0;transition:opacity .4s";
      svgEl.appendChild(ov);
    });
  }

  // Physical Spaces gap ring: static in both modes, never phase-driven
  SPACES_WEDGES.forEach(w => {
    const seg = document.createElementNS(svgns,"path");
    seg.setAttribute("d", w.d); seg.setAttribute("fill","var(--wheel-dormant-fill)"); seg.setAttribute("stroke","var(--wheel-dormant-stroke)"); seg.setAttribute("stroke-width","0.5");
    svgEl.appendChild(seg);
    [["Physical", w.ly-5], ["Spaces", w.ly+9]].forEach(([txt,y]) => {
      const t = document.createElementNS(svgns,"text");
      t.setAttribute("x", w.lx); t.setAttribute("y", y);
      t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
      t.style.cssText = "font-size:10px;font-weight:700;font-family:var(--font-sans);fill:var(--text-muted)";
      t.textContent = txt;
      svgEl.appendChild(t);
    });
  });

  // hub circle
  const hubBase = document.createElementNS(svgns,"circle");
  hubBase.setAttribute("cx","340"); hubBase.setAttribute("cy","340"); hubBase.setAttribute("r","140");
  hubBase.setAttribute("fill", interactive ? "var(--wheel-dormant-fill)" : RAMPS.accent.fill);
  hubBase.setAttribute("stroke", interactive ? "var(--wheel-dormant-stroke)" : RAMPS.accent.stroke);
  hubBase.setAttribute("stroke-width", interactive ? "0.5" : "1");
  svgEl.appendChild(hubBase);
  if (interactive) {
    const hubOv = document.createElementNS(svgns,"circle");
    hubOv.setAttribute("id","ov-hub"); hubOv.setAttribute("cx","340"); hubOv.setAttribute("cy","340"); hubOv.setAttribute("r","140");
    hubOv.setAttribute("fill","none"); hubOv.setAttribute("stroke","none");
    hubOv.style.cssText = "opacity:0;transition:opacity .4s";
    svgEl.appendChild(hubOv);
  }

  // top half of the hub: Dream App, large and the clear visual anchor.
  // Static mode (the restructure preview) leaves this half empty -- the
  // animated "hub" chip supplies the logo + "App" tag there instead, so we
  // never draw the same logo twice in the same spot.
  const hd = fitBox(LOGO_ASPECT.hub, HUB_BOX);
  if (interactive) {
    const hubImg = document.createElementNS(svgns,"image");
    hubImg.setAttribute("href","logos/"+data.hub.logo); hubImg.setAttributeNS("http://www.w3.org/1999/xlink","href","logos/"+data.hub.logo);
    hubImg.setAttribute("x", 340-hd.w/2); hubImg.setAttribute("y", 215-hd.h/2+39);
    hubImg.setAttribute("width", hd.w); hubImg.setAttribute("height", hd.h);
    hubImg.setAttribute("id","hub-title");
    svgEl.appendChild(hubImg);
    const hubAppTag = document.createElementNS(svgns,"text");
    hubAppTag.setAttribute("x","340"); hubAppTag.setAttribute("y", 254+hd.h/2+18);
    hubAppTag.setAttribute("text-anchor","middle"); hubAppTag.setAttribute("dominant-baseline","central");
    hubAppTag.style.cssText = "font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-sans);fill:var(--accent-dark)";
    hubAppTag.textContent = "App";
    svgEl.appendChild(hubAppTag);
    const hubSub = document.createElementNS(svgns,"text");
    hubSub.setAttribute("id","hub-sub");
    hubSub.setAttribute("x","340"); hubSub.setAttribute("y", 254+hd.h/2+34);
    hubSub.setAttribute("text-anchor","middle"); hubSub.setAttribute("dominant-baseline","central");
    hubSub.style.cssText = "font-size:10px;font-family:var(--font-sans);fill:var(--text-secondary)";
    hubSub.textContent = data.hub.subBefore;
    svgEl.appendChild(hubSub);
  }

  // divider between the App half and the resources half
  const hubDivider = document.createElementNS(svgns,"line");
  hubDivider.setAttribute("x1","200"); hubDivider.setAttribute("y1","340"); hubDivider.setAttribute("x2","480"); hubDivider.setAttribute("y2","340");
  hubDivider.setAttribute("stroke","rgba(66,45,35,.24)"); hubDivider.setAttribute("stroke-width","1.2");
  svgEl.appendChild(hubDivider);
  const colDivider = document.createElementNS(svgns,"line");
  colDivider.setAttribute("x1","340"); colDivider.setAttribute("y1","350"); colDivider.setAttribute("x2","340"); colDivider.setAttribute("y2","422");
  colDivider.setAttribute("stroke","rgba(66,45,35,.18)"); colDivider.setAttribute("stroke-width","1");
  svgEl.appendChild(colDivider);

  // bottom half, left column: Internal Resources (reuses the org chart's shared-resources list)
  const colTitle = (x, label) => {
    const t = document.createElementNS(svgns,"text");
    t.setAttribute("x", x); t.setAttribute("y", "358");
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.style.cssText = "font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;font-family:var(--font-sans);fill:var(--text-primary)";
    t.textContent = label;
    svgEl.appendChild(t);
  };
  colTitle(260, "Internal Resources");
  data.orgChart.shared.forEach((item, i) => {
    const t = document.createElementNS(svgns,"text");
    t.setAttribute("x","260"); t.setAttribute("y", 376 + i*12);
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.style.cssText = "font-size:9.5px;font-family:var(--font-sans);fill:var(--text-secondary)";
    t.textContent = item;
    svgEl.appendChild(t);
  });

  // bottom half, right column: Partnerships Engine, with Dream Ventures underneath
  colTitle(420, "Partnerships Engine");
  const venturesTitle = document.createElementNS(svgns,"text");
  venturesTitle.setAttribute("x","420"); venturesTitle.setAttribute("y","382");
  venturesTitle.setAttribute("text-anchor","middle"); venturesTitle.setAttribute("dominant-baseline","central");
  venturesTitle.style.cssText = "font-size:11px;font-weight:700;font-style:italic;font-family:var(--font-serif);fill:var(--text-primary)";
  venturesTitle.textContent = "Dream Ventures";
  svgEl.appendChild(venturesTitle);
  const venturesSub = document.createElementNS(svgns,"text");
  venturesSub.setAttribute("x","420"); venturesSub.setAttribute("y","396");
  venturesSub.setAttribute("text-anchor","middle"); venturesSub.setAttribute("dominant-baseline","central");
  venturesSub.style.cssText = "font-size:8.5px;font-family:var(--font-sans);fill:var(--text-secondary)";
  venturesSub.textContent = "invests in outside startups";
  svgEl.appendChild(venturesSub);

  // the four pillar logos, every one fit into the same box so none dominates.
  // Static mode (the restructure preview) skips these -- the scattered/new
  // chips supply the pillar logos there instead, at these exact same points.
  if (interactive) {
    WEDGES.forEach(w => {
      const div = data.divisions[w.key];
      const dims = fitBox(LOGO_ASPECT[w.key], PILLAR_BOX);
      const hasSub = !!div.sub;
      const logoCenterY = hasSub ? w.ly - 14 : w.ly;
      const img = document.createElementNS(svgns,"image");
      img.setAttribute("href","logos/"+div.logo); img.setAttributeNS("http://www.w3.org/1999/xlink","href","logos/"+div.logo);
      img.setAttribute("x", w.lx - dims.w/2); img.setAttribute("y", logoCenterY - dims.h/2);
      img.setAttribute("width", dims.w); img.setAttribute("height", dims.h);
      img.setAttribute("id", w.key+"-title");
      svgEl.appendChild(img);
      const sub = document.createElementNS(svgns,"text");
      sub.setAttribute("id", w.key+"-sub");
      sub.setAttribute("x", w.lx); sub.setAttribute("y", logoCenterY + dims.h/2 + 14);
      sub.setAttribute("text-anchor","middle"); sub.setAttribute("dominant-baseline","central");
      sub.style.cssText = "font-size:12px;font-family:var(--font-sans);fill:var(--text-secondary)";
      sub.textContent = div.sub || "";
      svgEl.appendChild(sub);
    });
  }
}

function buildWheel(container, data) {
  container.innerHTML = "";
  const nStops = data.phases.length;

  const phaseLabel = el("p", "phase-label", "Phase 1 (" + data.phases[0].range + ")");
  container.appendChild(phaseLabel);

  const tlSvg = document.createElementNS(svgns, "svg");
  tlSvg.setAttribute("width", "100%"); tlSvg.setAttribute("viewBox", "0 0 1120 90");
  tlSvg.style.cssText = "cursor:pointer;touch-action:none";
  const baseline = document.createElementNS(svgns, "line");
  baseline.setAttribute("x1","40"); baseline.setAttribute("y1","40"); baseline.setAttribute("x2","1080"); baseline.setAttribute("y2","40");
  baseline.setAttribute("stroke","var(--border)"); baseline.setAttribute("stroke-width","2");
  tlSvg.appendChild(baseline);
  const progress = document.createElementNS(svgns, "line");
  progress.setAttribute("id","tl-progress"); progress.setAttribute("x1","40"); progress.setAttribute("y1","40"); progress.setAttribute("x2","40"); progress.setAttribute("y2","40");
  progress.setAttribute("stroke", RAMPS.accent.stroke); progress.setAttribute("stroke-width","2");
  tlSvg.appendChild(progress);
  const step = 1040 / (nStops - 1);
  data.phases.forEach((p, idx) => {
    const x = 40 + idx * step;
    const c = document.createElementNS(svgns, "circle");
    c.setAttribute("id","stop-"+p.phase); c.setAttribute("cx", x); c.setAttribute("cy", 40); c.setAttribute("r", 7);
    const t = document.createElementNS(svgns, "text");
    t.setAttribute("x", x); t.setAttribute("y", 66); t.setAttribute("text-anchor","middle");
    t.setAttribute("style","font-size:12px;font-family:var(--font-sans);fill:var(--text-muted)"); t.textContent = p.range;
    tlSvg.appendChild(c); tlSvg.appendChild(t);
  });
  container.appendChild(tlSvg);

  const finalBanner = el("div", "final-banner");
  finalBanner.id = "finalBanner";
  finalBanner.appendChild(el("p", "big", "The Dream ecosystem is fully operational"));
  finalBanner.appendChild(el("p", "small", "Every phase delivered. All five businesses live, one connected ecosystem."));
  container.appendChild(finalBanner);

  const mainRow = el("div", "main-row");
  container.appendChild(mainRow);
  const wheelCol = el("div", "wheel-col");
  const wheelRow = el("div", "wheel-row");
  wheelCol.appendChild(wheelRow);
  const listCol = el("div", "list-col");
  mainRow.appendChild(wheelCol);
  mainRow.appendChild(listCol);

  const thermoWrap = el("div", "thermo-wrap");
  thermoWrap.appendChild(el("div", "thermo-label", "0%"));
  thermoWrap.lastChild.id = "ecoPct";
  const track = el("div", "thermo-track");
  const fill = el("div", "thermo-fill");
  fill.id = "thermoFill";
  track.appendChild(fill);
  thermoWrap.appendChild(track);
  thermoWrap.appendChild(el("div", "thermo-cap", "live"));
  wheelRow.appendChild(thermoWrap);

  const wheelShell = el("div", "wheel-shell");
  wheelShell.id = "wheelCol";
  wheelRow.appendChild(wheelShell);
  const wheelSvg = document.createElementNS(svgns, "svg");
  wheelSvg.setAttribute("width","100%"); wheelSvg.setAttribute("viewBox","0 0 680 680");

  renderWheelSVG(wheelSvg, data, "interactive");

  wheelShell.appendChild(wheelSvg);

  const heading = el("div", "deliverables-heading");
  heading.appendChild(el("span", null, "Core deliverables"));
  heading.appendChild(el("span", null, ""));
  heading.lastChild.id = "deliverablesCount";
  listCol.appendChild(heading);
  const msPanel = el("div"); msPanel.id = "msPanel";
  listCol.appendChild(msPanel);

  const cn = el("div","coming-next");
  cn.id = "comingNext";
  cn.style.display = "none";
  cn.appendChild(el("p",null,"Coming next (year 2 and beyond)"));
  const ul = el("ul");
  data.comingNext.forEach(item => ul.appendChild(el("li", null, esc(item))));
  cn.appendChild(ul);
  listCol.appendChild(cn);

  function setSector(key, state, ramp) {
    const ov = document.getElementById("ov-"+key);
    const title = document.getElementById(key+"-title");
    const sub = document.getElementById(key+"-sub");
    if (state === "complete") {
      ov.style.fill = ramp.fill; ov.style.stroke = ramp.stroke; ov.style.opacity = "1";
      if (title.tagName === "text") title.style.fill = ramp.title;
      sub.style.fill = ramp.sub;
    } else if (state === "progress") {
      ov.style.fill = "url(#hatch-accent)"; ov.style.stroke = ramp.stroke; ov.style.opacity = "1";
      if (title.tagName === "text") title.style.fill = ramp.stroke;
      sub.style.fill = "var(--text-secondary)";
    } else {
      ov.style.fill = "none"; ov.style.stroke = "none"; ov.style.opacity = "0";
      if (title.tagName === "text") title.style.fill = "var(--text-secondary)";
      sub.style.fill = "var(--text-secondary)";
    }
  }

  function renderTimeline(phase) {
    data.phases.forEach((p, idx) => {
      const c = document.getElementById("stop-"+p.phase);
      if (p.phase < phase) { c.setAttribute("r","7"); c.setAttribute("fill", RAMPS.accent.stroke); c.setAttribute("stroke", RAMPS.accent.stroke); c.setAttribute("stroke-width","1"); }
      else if (p.phase === phase) { c.setAttribute("r","10"); c.setAttribute("fill", RAMPS.accent.fill); c.setAttribute("stroke", RAMPS.accent.stroke); c.setAttribute("stroke-width","2"); }
      else { c.setAttribute("r","7"); c.setAttribute("fill","var(--surface-1)"); c.setAttribute("stroke","var(--border-strong)"); c.setAttribute("stroke-width","1"); }
    });
    document.getElementById("tl-progress").setAttribute("x2", 40 + (phase-1) * step);
  }

  const totalItems = data.phases.reduce((sum, p) => sum + p.items.length, 0);

  function setPhase(phase) {
    phase = Math.min(nStops, Math.max(1, Math.round(phase)));
    const p = data.phases[phase-1];
    phaseLabel.textContent = "Phase " + phase + " (" + p.range + ")";
    Object.keys(data.divisions).forEach(key => {
      if (key === "spaces") return; // Physical Spaces is now a static gap ring, not phase-driven
      const div = data.divisions[key];
      let state = "dormant";
      if (phase >= div.threshold) state = "complete";
      else if (div.progressAt && phase >= div.progressAt) state = "progress";
      setSector(key, state, RAMPS[div.style]);
    });
    const itemsSoFar = data.phases.slice(0, phase).reduce((sum, ph) => sum + ph.items.length, 0);
    const pct = Math.round(itemsSoFar/totalItems*100);
    document.getElementById("ecoPct").textContent = pct + "%";
    document.getElementById("thermoFill").style.height = pct + "%";
    setSector("hub", phase >= data.hub.threshold ? "complete" : "dormant", RAMPS.accent);
    document.getElementById("hub-sub").textContent = phase >= data.hub.osThreshold ? data.hub.subAfter : data.hub.subBefore;

    msPanel.innerHTML = p.items.map(ms =>
      '<div class="ms-item"><p class="ms-tag">' + esc(data.divLabel[ms.tag]) + '</p><p class="ms-title">' + esc(ms.title) + '</p><p class="ms-detail">' + esc(ms.detail) + '</p></div>'
    ).join("");
    document.getElementById("deliverablesCount").textContent = p.items.length + " for this phase";

    const isFinal = phase === nStops;
    document.getElementById("comingNext").style.display = isFinal ? "block" : "none";
    document.getElementById("finalBanner").classList.toggle("show", isFinal);
    document.getElementById("wheelCol").classList.toggle("complete", isFinal);

    renderTimeline(phase);
  }

  let dragging = false;
  function xToPhase(clientX) {
    const rect = tlSvg.getBoundingClientRect();
    const scale = 1120 / rect.width;
    const x = (clientX - rect.left) * scale;
    return 1 + (x - 40) / step;
  }
  tlSvg.addEventListener("pointerdown", e => { dragging = true; tlSvg.setPointerCapture(e.pointerId); setPhase(xToPhase(e.clientX)); });
  tlSvg.addEventListener("pointermove", e => { if (dragging) setPhase(xToPhase(e.clientX)); });

    stage.classList.toggle("restructured", on);

      const { pos, content } = chipEls[item.key];
      const t = on ? targets[item.key] : { x: item.x, y: item.y };

/* ---------- Org chart ---------- */
function buildOrgChart(container, data) {
  const o = data.orgChart;
  const n = o.businesses.length;
  const hubIdx = o.businesses.findIndex(b => b.key === "hub");
  const colGap = 240;
  const colXs = o.businesses.map((_, i) => (i - hubIdx) * colGap);
  const CX = 0;
  const leftEdge = Math.min(...colXs) - 85, rightEdge = Math.max(...colXs) + 85;
  const boxW = 170, boxH = 48, topW = 170, topH = 44;

  const groupY = 30, boardY = 100, ceoY = 170;
  const sharedTop = 218, sharedH = 100, sharedBottom = sharedTop + sharedH;
  const busY = 358;
  const bizTop = 398, bizCenterY = bizTop + boxH / 2;
  const branchY = 462, childTop = 476, childH = 40;

  const svg = document.createElementNS(svgns, "svg");
  const vbW = rightEdge - leftEdge + 100;
  svg.setAttribute("viewBox", `${leftEdge - 50} 0 ${vbW} 540`);
  svg.setAttribute("width", "100%");
  svg.classList.add("org-svg");

  const line = (x1, y1, x2, y2, dash) => {
    const l = document.createElementNS(svgns, "line");
    l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
    l.setAttribute("stroke", "var(--border-strong)"); l.setAttribute("stroke-width", "1.5");
    if (dash) l.setAttribute("stroke-dasharray", dash);
    svg.appendChild(l);
  };
  const box = (x, y, w, h, label, opts) => {
    opts = opts || {};
    const g = document.createElementNS(svgns, "g");
    const r = document.createElementNS(svgns, "rect");
    r.setAttribute("x", x - w/2); r.setAttribute("y", y - h/2); r.setAttribute("width", w); r.setAttribute("height", h);
    r.setAttribute("rx", opts.rx || 10);
    r.setAttribute("fill", opts.fill || "var(--text-primary)");
    if (opts.stroke) { r.setAttribute("stroke", opts.stroke); r.setAttribute("stroke-width", "1.5"); }
    if (opts.dash) r.setAttribute("stroke-dasharray", opts.dash);
    g.appendChild(r);
    const t = document.createElementNS(svgns, "text");
    t.setAttribute("x", x); t.setAttribute("y", y);
    t.setAttribute("text-anchor", "middle"); t.setAttribute("dominant-baseline", "central");
    t.style.cssText = `font-family:var(--font-sans);font-weight:700;font-size:${opts.fontSize||13}px;fill:${opts.color||"#fff"}`;
    t.textContent = label;
    g.appendChild(t);
    svg.appendChild(g);
    return { top: y - h/2, bottom: y + h/2 };
  };

  line(CX, groupY + topH/2, CX, boardY - topH/2);
  line(CX, boardY + topH/2, CX, ceoY - topH/2);
  line(CX, ceoY + topH/2, CX, sharedTop);
  box(CX, groupY, topW, topH, o.group);
  box(CX, boardY, topW, topH, o.board);
  box(CX, ceoY, topW, topH, o.ceo);

  const sharedRect = document.createElementNS(svgns, "rect");
  sharedRect.setAttribute("x", leftEdge); sharedRect.setAttribute("y", sharedTop);
  sharedRect.setAttribute("width", rightEdge - leftEdge); sharedRect.setAttribute("height", sharedH);
  sharedRect.setAttribute("rx", 14); sharedRect.setAttribute("fill", "var(--surface-1)");
  sharedRect.setAttribute("stroke", "var(--border-strong)"); sharedRect.setAttribute("stroke-dasharray", "5 4");
  svg.appendChild(sharedRect);
  const pillW = 130, pillGap = 16;
  const pillsTotal = o.shared.length * pillW + (o.shared.length - 1) * pillGap;
  let pillX = CX - pillsTotal/2 + pillW/2;
  o.shared.forEach(s => {
    box(pillX, sharedTop + sharedH/2, pillW, 40, s, { fill: "rgba(66,45,35,.7)", fontSize: 12 });
    pillX += pillW + pillGap;
  });

  line(CX, sharedBottom, CX, busY);
  line(colXs[0], busY, colXs[n-1], busY);
  o.businesses.forEach((b, i) => line(colXs[i], busY, colXs[i], bizTop));

  o.businesses.forEach((b, i) => {
    const isHub = b.key === "hub";
    const rect = box(colXs[i], bizCenterY, boxW, boxH, b.label, isHub
      ? { fill: "var(--accent)", fontSize: 14 }
      : { fill: "var(--accent-soft)", color: "var(--accent-dark)", stroke: "var(--accent)" });
    if (b.children) {
      if (b.children.length > 1) {
        const kidGap = 150;
        const kidXs = b.children.map((_, ci) => colXs[i] + (ci - (b.children.length-1)/2) * kidGap);
        line(colXs[i], bizCenterY + boxH/2, colXs[i], branchY);
        line(kidXs[0], branchY, kidXs[kidXs.length-1], branchY);
        kidXs.forEach(kx => line(kx, branchY, kx, childTop));
        b.children.forEach((ch, ci) => box(kidXs[ci], childTop + childH/2, 140, childH, ch.label, { fill: "var(--surface-1)", color: "var(--text-primary)", stroke: "var(--border-strong)", fontSize: 12 }));
      } else {
        line(colXs[i], bizCenterY + boxH/2, colXs[i], childTop);
        box(colXs[i], childTop + childH/2, 140, childH, b.children[0].label, { fill: "var(--surface-1)", color: "var(--text-primary)", stroke: "var(--border-strong)", fontSize: 12 });
      }
    }
  });

  container.appendChild(svg);
}

/* ---------- Cool-but-restrained motion layer ---------- */
function animateCount(elm) {
  const target = parseFloat(elm.dataset.value);
  const prefix = elm.dataset.prefix || "";
  const suffix = elm.dataset.suffix || "";
  if (prefersReduced) { elm.textContent = prefix + target + suffix; return; }
  const duration = 1100;
  const start = performance.now();
  function frame(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    elm.textContent = prefix + Math.round(target * eased) + suffix;
    if (t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function initEffects() {
  const revealEls = document.querySelectorAll(".reveal");
  if (prefersReduced) {
    revealEls.forEach(e => e.classList.add("is-visible"));
  } else if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(e => io.observe(e));
  } else {
    revealEls.forEach(e => e.classList.add("is-visible"));
  }

  const statEls = document.querySelectorAll(".stat-num");
  if (statEls.length && "IntersectionObserver" in window) {
    const statIo = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { animateCount(entry.target); statIo.unobserve(entry.target); }
      });
    }, { threshold: 0.4 });
    statEls.forEach(e => statIo.observe(e));
  } else {
    statEls.forEach(animateCount);
  }

  const sections = ["intro","restructure","journey","roadmap","resources"].map(id => document.getElementById(id)).filter(Boolean);
  const navLinks = Array.from(document.querySelectorAll("#siteNav a"));
  if (sections.length && navLinks.length && "IntersectionObserver" in window) {
    const spy = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.toggle("active", a.getAttribute("href") === "#" + entry.target.id));
        }
      });
    }, { rootMargin: "-45% 0px -50% 0px" });
    sections.forEach(s => spy.observe(s));
  }
  navLinks.forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      const target = document.querySelector(a.getAttribute("href"));
      if (target) target.scrollIntoView({ behavior: prefersReduced ? "auto" : "smooth", block: "start" });
    });
  });

  const bar = document.getElementById("scrollProgress");
  let ticking = false;
  function updateProgress() {
    const h = document.documentElement;
    const max = h.scrollHeight - h.clientHeight;
    bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + "%";
    ticking = false;
  }
  window.addEventListener("scroll", () => { if (!ticking) { requestAnimationFrame(updateProgress); ticking = true; } }, { passive: true });
  updateProgress();

  initCursor();
  initMagnetic();
}

function initCursor() {
  if (prefersReduced || window.matchMedia("(pointer: coarse)").matches) return;
  const dot = document.getElementById("cursorDot");
  let shown = false;
  window.addEventListener("mousemove", e => {
    if (!shown) { dot.classList.add("active"); shown = true; }
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
    const target = e.target.closest("button, a, .chip, .path-tab, .phone");
    dot.classList.toggle("hover", !!target);
  }, { passive: true });
  window.addEventListener("mouseleave", () => dot.classList.remove("active"));
}

function initMagnetic() {
  if (prefersReduced || window.matchMedia("(pointer: coarse)").matches) return;
  document.querySelectorAll(".magnetic").forEach(elm => {
    elm.style.transition = elm.style.transition || "transform .3s var(--ease)";
    elm.addEventListener("mousemove", e => {
      const rect = elm.getBoundingClientRect();
      const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
      const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
      elm.style.transform = "translate(" + x.toFixed(1) + "px," + y.toFixed(1) + "px)";
    });
    elm.addEventListener("mouseleave", () => { elm.style.transform = "translate(0,0)"; });
  });
}

/* ---------- Decryption (in-browser, password never leaves the device) ---------- */
const PW_KEY = "dream_roadmap_pw";
async function decryptRoadmap(enc, password) {
  const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: dec(enc.salt), iterations: enc.iter, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const buf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: dec(enc.iv) }, key, dec(enc.ct));
  return JSON.parse(new TextDecoder().decode(buf));
}

function showError(msg) {
  document.getElementById("app").innerHTML = '<div class="gate-wrap"><p style="color:#a53a24">' + esc(msg) + '</p></div>';
}

function showGate(enc) {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const wrap = el("div", "gate-wrap");
  const g = el("div", "gate");
  g.appendChild(el("div", "lock", "🔒"));
  g.appendChild(el("h2", null, "Dream: restructure &amp; roadmap"));
  g.appendChild(el("p", null, "Enter the password to unlock. It decrypts on this device only."));
  const input = el("input");
  input.type = "password"; input.placeholder = "Password"; input.autocomplete = "current-password";
  const btn = el("button", null, "Unlock");
  const err = el("div", "err");
  const remember = el("input"); remember.type = "checkbox"; remember.checked = true;
  const rememberLabel = el("label"); rememberLabel.appendChild(remember); rememberLabel.appendChild(document.createTextNode("Remember on this device"));
  g.appendChild(input); g.appendChild(btn); g.appendChild(err); g.appendChild(rememberLabel);
  wrap.appendChild(g);
  app.appendChild(wrap);
  input.focus();

  const attempt = async () => {
    err.textContent = ""; btn.textContent = "Unlocking...";
    try {
      const d = await decryptRoadmap(enc, input.value);
      if (remember.checked) localStorage.setItem(PW_KEY, input.value);
      render(d);
      const foot = document.getElementById("foot");
      foot.innerHTML = (foot.textContent ? foot.textContent + " · " : "") + '<a id="lockLink">Lock</a>';
      document.getElementById("lockLink").addEventListener("click", () => { localStorage.removeItem(PW_KEY); location.reload(); });
    } catch (e) {
      btn.textContent = "Unlock";
      err.textContent = "Wrong password, try again.";
      input.select();
    }
  };
  btn.addEventListener("click", attempt);
  input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
}

async function boot() {
  let enc;
  try {
    enc = await fetch("data/roadmap.enc.json?v=" + Date.now()).then(r => { if (!r.ok) throw new Error(); return r.json(); });
  } catch (e) {
    showError("Could not load the roadmap data. It may not have been published yet.");
    return;
  }
  const saved = localStorage.getItem(PW_KEY);
  if (saved) {
    try {
      render(await decryptRoadmap(enc, saved));
      const foot = document.getElementById("foot");
      foot.innerHTML = (foot.textContent ? foot.textContent + " · " : "") + '<a id="lockLink">Lock</a>';
      document.getElementById("lockLink").addEventListener("click", () => { localStorage.removeItem(PW_KEY); location.reload(); });
      return;
    } catch (e) { localStorage.removeItem(PW_KEY); }
  }
  showGate(enc);
}
boot();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
